const GEMINI_PROMPT="請分析這張收據／信用卡明細的照片，把每一筆消費整理成以下格式，每行一筆，不要加任何說明文字：\n日期,店家,類別,金額,退稅,備註\n規則：日期用 YYYY-MM-DD；金額只填日圓數字（不要逗號或¥）；類別從〔餐飲/交通/購物/電器/藥妝/門票/住宿/其他〕選一個；退稅填〔無/A/B〕無法判斷就填無；備註簡短。";

let EXP=JSON.parse(localStorage.getItem('expenses')||'[]');

/* ===================== 工具 ===================== */
const $=s=>document.querySelector(s);
function toast(m){const t=$('#toast');t.textContent=m;t.style.opacity=.95;t.classList.remove('opacity-0');setTimeout(()=>{t.style.opacity=0;},1600);}
const mapUrl=q=>'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);
const yen=n=>'¥'+Number(n).toLocaleString();
const twd=n=>'NT$'+Math.round(n*RATE).toLocaleString();
const save=()=>localStorage.setItem('expenses',JSON.stringify(EXP));
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function stars(n){let s='';for(let i=1;i<=5;i++)s+=`<span class="${i<=n?'text-amber-400':'text-white/30'}">★</span>`;return `<span class="text-[13px] tracking-tight">${s}</span>`;}

/* ===================== 行程渲染 ===================== */
let SEL=0, WX=null, WXERR=false;
function renderTrip(){
  const today=new Date().toISOString().slice(0,10);
  const ti=ITIN.findIndex(d=>d.date===today); SEL=ti>=0?ti:0;
  const chips=ITIN.map((d,i)=>`<button onclick="showDay(${i})" data-chip="${i}" class="flex-none w-[64px] py-2 rounded-2xl text-center bg-white shadow-sm text-slate-700 active:scale-95 transition-transform">
      <div class="text-[14px] font-extrabold leading-none">${d.d}</div>
      <div class="text-[10.5px] opacity-60 mt-1 leading-none">${d.date.slice(5)}</div>
      <div class="text-[10.5px] opacity-50 mt-0.5 leading-none">（${d.dow}）</div></button>`).join('');
  $('#p-trip').innerHTML=`
    <div class="flex gap-2 overflow-x-auto pb-2 mb-2 -mx-4 px-4">${chips}</div>
    <div id="dayView"></div>`;
  showDay(SEL);
  loadWeather();
}
function showDay(di){
  SEL=di;
  document.querySelectorAll('[data-chip]').forEach(b=>{
    const on=+b.dataset.chip===di;
    b.classList.toggle('bg-amber-500',on);b.classList.toggle('text-white',on);
    b.classList.toggle('bg-white',!on);b.classList.toggle('text-slate-700',!on);
    if(on)b.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  });
  const day=ITIN[di];
  let h=`<section class="fade">
    <div class="relative h-44 rounded-2xl overflow-hidden mb-3 bg-slate-700">
      <img src="${imgUrl(day.hero)}" loading="lazy" onerror="this.style.display='none'" class="absolute inset-0 w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/25 to-transparent"></div>
      <div class="absolute left-3 bottom-3 text-white">
        <span class="inline-block bg-amber-500 text-[11px] font-extrabold px-2.5 py-0.5 rounded-full mb-1.5">${day.d}・${day.date.slice(5)}（${day.dow}）</span>
        <div class="text-[20px] font-extrabold leading-tight drop-shadow">${esc(day.title)}</div>
      </div>
    </div>
    <div id="wxbox" class="rounded-2xl bg-gradient-to-br from-sky-50 to-indigo-50 border border-sky-100 px-4 py-3 mb-3 text-[13px] text-slate-600 flex items-center gap-3"><span class="text-2xl">⛅</span><span>天氣載入中…</span></div>
    <div class="grid grid-cols-2 gap-3">`;
  day.pois.forEach((p,pi)=>{
    const span=p.big?'col-span-2 h-44':'h-40';
    h+=`<button onclick="openSheet(${di},${pi})" class="relative ${span} rounded-2xl overflow-hidden text-left bg-slate-700 active:scale-[.98] transition-transform">
      <img src="${imgUrl(p.img)}" loading="lazy" onerror="this.style.display='none'" class="absolute inset-0 w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/30 to-black/5"></div>
      <span onclick="event.stopPropagation();window.open('${mapUrl(p.q)}','_blank')" class="absolute top-2 right-2 bg-white/90 text-slate-800 text-[11px] font-bold px-2.5 py-1 rounded-full backdrop-blur">📍 地圖</span>

/* ===================== 天氣（含體感＋帶傘）===================== */
async function loadWeather(){
  try{
    const url='https://api.open-meteo.com/v1/forecast?latitude=35.71&longitude=139.71&daily=weather_code,temperature_2m_max,temperature_2m_min,apparent_temperature_max,precipitation_probability_max,precipitation_sum&timezone=Asia%2FTokyo&forecast_days=16';
    const j=await(await fetch(url)).json();
    WX={};(j.daily.time||[]).forEach((t,i)=>{WX[t]={c:j.daily.weather_code[i],hi:j.daily.temperature_2m_max[i],lo:j.daily.temperature_2m_min[i],feel:j.daily.apparent_temperature_max[i],pop:j.daily.precipitation_probability_max[i],ps:j.daily.precipitation_sum[i]};});
    WXERR=false;renderDayWeather();
  }catch(e){WXERR=true;renderDayWeather();}
}
function renderDayWeather(){
  const box=$('#wxbox');if(!box)return;
  if(WXERR){box.innerHTML=`<span class="text-2xl">📡</span><span>天氣載入失敗，請確認網路</span>`;return;}
  if(!WX)return;
  const w=WX[ITIN[SEL].date];
  if(!w){box.innerHTML=`<span class="text-2xl">📅</span><span>預報尚未開放（出發前約 16 天提供當日預報）</span>`;return;}
  const wc=wxCode(w.c),um=umbrella(w.pop,w.ps);
  box.innerHTML=`<span class="text-3xl">${wc.e}</span>
    <div class="leading-tight">
      <div><b class="text-[16px] text-slate-800">${Math.round(w.lo)}°–${Math.round(w.hi)}°</b> <span class="text-slate-500">${wc.d}</span></div>
      <div class="text-[12px] text-slate-500 mt-0.5">體感最高 ${Math.round(w.feel)}°・降雨 ${w.pop??'–'}%</div>
    </div>
    <span class="ml-auto text-[12px] font-bold px-2.5 py-1 rounded-full ${um.cls}">${um.t}</span>`;
}
function umbrella(pop,ps){
  if((pop>=50)||(ps>=2)) return {t:'☔ 建議帶傘',cls:'bg-blue-600 text-white'};
  if(pop>=30) return {t:'🌂 可備傘',cls:'bg-amber-100 text-amber-700'};
  return {t:'☀️ 免帶傘',cls:'bg-emerald-100 text-emerald-700'};
}
function wxCode(c){
  if(c===0)return{e:'☀️',d:'晴'};
  if([1,2,3].includes(c))return{e:'⛅',d:'多雲'};
  if([45,48].includes(c))return{e:'🌫️',d:'霧'};
  if([51,53,55,56,57].includes(c))return{e:'🌦️',d:'毛毛雨'};
  if([61,63,65,66,67,80,81,82].includes(c))return{e:'🌧️',d:'下雨'};
  if([71,73,75,77,85,86].includes(c))return{e:'❄️',d:'雪'};
  if([95,96,99].includes(c))return{e:'⛈️',d:'雷雨'};
  return{e:'⛅',d:'多雲'};
}

function renderTaxTrack(){
  const box=$('#taxTrack');if(!box)return;const TH=5000;const g={};
  EXP.forEach(e=>{if(!e.tax||e.tax==='無')return;const k=e.store+'｜'+e.date;g[k]=g[k]||{store:e.store,date:e.date,tax:e.tax,sum:0};g[k].sum+=e.amt;});
  const arr=Object.values(g).sort((a,b)=>b.date.localeCompare(a.date)||b.sum-a.sum);
  if(!arr.length){box.innerHTML='<div class="bg-white rounded-2xl shadow-sm text-center text-slate-400 text-[13px] py-8">記帳時把「退稅」選 A 或 B，這裡就會自動追蹤門檻</div>';return;}
  box.innerHTML=arr.map(x=>{const pct=Math.min(100,Math.round(x.sum/TH*100));const full=x.sum>=TH;const diff=TH-x.sum;
    const msg=full?`✅ 已達門檻（${x.tax}制）${x.sum>=5500?'，含稅亦穩過':'，注意門檻為不含稅，含稅約需 ¥5,500'}`:`再消費 <b>${yen(diff)}</b> 可達 ¥5,000 門檻（${x.tax}制）`;
    return `<div class="bg-white rounded-2xl shadow-sm p-4 mb-2.5">
      <div class="flex justify-between font-bold text-[14px]"><span>${esc(x.store)}</span><span>${yen(x.sum)}</span></div>

}
